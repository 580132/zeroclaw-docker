name: Build ZeroClaw Docker Image

on:
  workflow_dispatch: # 允许手动点击按钮触发构建

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 克隆目标仓库的代码（无需复刻）
      - name: Checkout ZeroClaw
        uses: actions/checkout@v4
        with:
          repository: zeroclaw-labs/zeroclaw
          fetch-depth: 1
       - name: Setup Node.js
        if: steps.decision.outputs.build == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Web UI
        if: steps.decision.outputs.build == 'true'
        run: |
          cd web           # 进入前端源码目录
          npm install      # 安装前端依赖
          npm run build    # 编译前端，生成 web/dist 目录
          ls -R web/dist   # 确认文件已生成（调试用）
      # 2. 登录到 GitHub 容器注册表
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. 提取元数据（用于打标签）
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zeroclaw

      # 4. 构建并推送镜像
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/zeroclaw:latest
          # 针对多平台构建（可选）
          # platforms: linux/amd64,linux/arm64
